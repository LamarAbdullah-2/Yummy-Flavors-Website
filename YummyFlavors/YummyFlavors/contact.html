  <main class="main contact-page">

    <section class="contact-header">
      <h1>Contact Us</h1>
      <p>
        Have a question or suggestion? Fill out the form below and we will get back to you soon.
      </p>
    </section>

    <div class="contact-card">
      <form class="contact-form">

        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" placeholder="Enter your first name" required>
          </div>

          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" placeholder="Enter your last name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
              <label><input type="radio" name="gender" required> Male</label>
              <label><input type="radio" name="gender"> Female</label>
            </div>
          </div>

          <div class="form-group">
            <label for="mobile">Mobile</label>
            <input type="tel" id="mobile" name="mobile" placeholder="05XXXXXXXX" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>
          </div>
        </div>

        <div class="form-row full-width">
          <div class="form-group">
            <label for="language">Preferred Language</label>
            <select id="language" name="language">
              <option>Arabic</option>
              <option>English</option>
	      <option>French</option>
            </select>
          </div>
        </div>

        <div class="form-row full-width">
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
          </div>
        </div>

        <div class="form-button">
          <button type="submit" class="contact-btn">Send Message</button>
        </div>

      </form>
    </div>

  </main>

  <footer class="footer">
    <p>© 2026 Yummy Flavors. All rights reserved.</p>
  </footer>

</body>
